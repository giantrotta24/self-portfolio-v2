[build]
  command = "npm run build"
  publish = "dist"

# Security headers. Lighthouse's Best Practices "trust & safety" audits
# (csp-xss, has-hsts, origin-isolation, clickjacking-mitigation,
# trusted-types-xss) flag these as missing — they're weight-0 in the
# score so they don't move the number, but the gaps are real in
# production, not just on the dev server.
#
# script-src's hash covers the one inline script Astro emits (the
# mobile-nav Escape-key handler in Header.astro) — it's byte-identical
# on every page. If a future dependency bump changes the minified
# output, this hash will need regenerating: build the site, then
#   node -e "const c=require('fs').readFileSync('dist/index.html','utf8').match(/<script type=\"module\">(.*?)<\/script>/s)[1]; console.log('sha256-'+require('crypto').createHash('sha256').update(c).digest('base64'))"
# JSON-LD <script type="application/ld+json"> blocks are exempt from
# script-src by spec (non-JS MIME type), so they need no entry here
# despite differing per page.
#
# app.cal.com is the Contact page's booking widget (loaded lazily, on
# click, from a bundled same-origin script — see contact.astro). It
# needs script-src (the embed.js it injects) and frame-src (the modal
# iframe); there's no dedicated frame-src fallback to default-src
# once it's declared, so 'self' has to be restated here too.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-kOf4WRzWmFPXcQvmRYat0Nt1+40XXSbXeSPuO+Kl/C8=' https://app.cal.com; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://app.cal.com; frame-src 'self' https://app.cal.com; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; require-trusted-types-for 'script'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"

# Markdown page versions (generate-markdown-pages.mjs) — serve with the
# correct MIME type instead of Netlify's default octet-stream for .md.
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
